<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="flask" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7"/>
    </linearGradient>
    <clipPath id="flaskClip">
      <path d="M46,22 L46,52 L20,92 Q16,100 20,106 Q24,112 32,112 L96,112 Q104,112 108,106 Q112,100 108,92 L82,52 L82,22 Z"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Flask liquid fill (clipped) -->
  <rect x="14" y="72" width="100" height="46" fill="url(#liquid)" opacity="0.85" clip-path="url(#flaskClip)"/>

  <!-- Flask outline -->
  <path d="M46,22 L46,52 L20,92 Q16,100 20,106 Q24,112 32,112 L96,112 Q104,112 108,106 Q112,100 108,92 L82,52 L82,22"
        fill="none" stroke="white" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>

  <!-- Flask neck top cap -->
  <rect x="40" y="18" width="48" height="8" rx="4" fill="white" opacity="0.85"/>

  <!-- Bubbles in liquid -->
  <circle cx="48" cy="96" r="5" fill="white" opacity="0.3"/>
  <circle cx="68" cy="88" r="3.5" fill="white" opacity="0.25"/>
  <circle cx="82" cy="100" r="4" fill="white" opacity="0.3"/>
  <circle cx="58" cy="104" r="2.5" fill="white" opacity="0.2"/>
  <circle cx="75" cy="94" r="2" fill="white" opacity="0.25"/>

  <!-- Bubbles rising above liquid -->
  <circle cx="55" cy="65" r="3" fill="url(#liquid)" opacity="0.6"/>
  <circle cx="72" cy="60" r="2" fill="url(#liquid)" opacity="0.5"/>
  <circle cx="63" cy="56" r="1.5" fill="url(#liquid)" opacity="0.4"/>
</svg>
